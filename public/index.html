<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Proof</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      cursor: pointer;
      font-weight: bold;
    }

    .bar-bg {
      width: 100%;
      background: #334155;
      margin-top: 10px;
      border-radius: 5px;
      overflow: hidden;
    }

    .bar {
      height: 10px;
      width: 0%;
      background: #22c55e;
      transition: width 0.2s;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Upload Proof</h2>

    <input type="file" id="file" accept="image/*,application/pdf" />

    <button onclick="upload()">Upload</button>

    <div class="bar-bg">
      <div class="bar" id="bar"></div>
    </div>

    <p id="status"></p>

    <input id="link" readonly placeholder="Your link will appear here"/>
  </div>

  <script>
    function upload() {
      const file = document.getElementById("file").files[0];
      const bar = document.getElementById("bar");
      const status = document.getElementById("status");

      if (!file) {
        alert("Select a file first");
        return;
      }

      const data = new FormData();
      data.append("file", file);
      data.append("upload_preset", "temp_uploads");

      const xhr = new XMLHttpRequest();

      // ✅ FIXED ENDPOINT (IMPORTANT)
      xhr.open("POST", "https://api.cloudinary.com/v1_1/dha0gt3hv/auto/upload");

      xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
          let percent = Math.round((e.loaded / e.total) * 100);
          bar.style.width = percent + "%";
          status.innerText = "Uploading " + percent + "%";
        }
      };

      xhr.onload = function() {
        const res = JSON.parse(xhr.responseText);

        if (res.secure_url) {
          document.getElementById("link").value = res.secure_url;
          status.innerText = "Upload complete ✅";
        } else {
          console.log(res);
          status.innerText = "Upload failed ❌";
        }
      };

      xhr.onerror = function() {
        status.innerText = "Network error ❌";
      };

      xhr.send(data);
    }
  </script>

</body>
</html>
