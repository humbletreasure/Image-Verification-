<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Proof</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 340px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    input[type="file"] {
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    .upload-btn {
      background: #22c55e;
      color: black;
    }

    .copy-btn {
      background: #3b82f6;
      color: white;
    }

    .bar-container {
      width: 100%;
      background: #334155;
      border-radius: 6px;
      margin-top: 10px;
      overflow: hidden;
    }

    .bar {
      height: 10px;
      width: 0%;
      background: #22c55e;
      transition: width 0.2s;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Upload Proof</h2>

    <input type="file" id="fileInput" accept="image/*,application/pdf" />

    <button class="upload-btn" onclick="uploadFile()">Upload</button>

    <div class="bar-container">
      <div class="bar" id="bar"></div>
    </div>

    <p id="status"></p>

    <input type="text" id="linkBox" readonly placeholder="Your link will appear here" />

    <button class="copy-btn" onclick="copyLink()">Copy Link</button>
  </div>

  <script>
    async function uploadFile() {
      const file = document.getElementById("fileInput").files[0];
      const status = document.getElementById("status");
      const bar = document.getElementById("bar");

      if (!file) {
        alert("Select a file first");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", "temp_uploads");
      formData.append("folder", "temp_verification");
      formData.append("tags", "temp_verification");

      const xhr = new XMLHttpRequest();

      xhr.open("POST", "https://api.cloudinary.com/v1_1/dha0gt3hv/upload");

      xhr.upload.onprogress = function (e) {
        if (e.lengthComputable) {
          let percent = Math.round((e.loaded / e.total) * 100);
          bar.style.width = percent + "%";
          status.innerText = "Uploading... " + percent + "%";
        }
      };

      xhr.onload = function () {
        const response = JSON.parse(xhr.responseText);

        if (response.secure_url) {
          status.innerText = "Upload complete ✅";
          document.getElementById("linkBox").value = response.secure_url;
        } else {
          status.innerText = "Upload failed ❌";
        }
      };

      xhr.onerror = function () {
        status.innerText = "Error uploading file";
      };

      xhr.send(formData);
    }

    function copyLink() {
      const box = document.getElementById("linkBox");

      if (!box.value) {
        alert("No link yet");
        return;
      }

      box.select();
      document.execCommand("copy");
      alert("Link copied!");
    }
  </script>

</body>
</html>
