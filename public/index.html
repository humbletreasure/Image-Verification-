<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Proof</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 350px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    img, iframe {
      width: 100%;
      margin-top: 15px;
      border-radius: 8px;
      display: none;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>View Uploaded Proof</h2>

    <input type="text" id="linkInput" placeholder="Paste link here..." />
    <button onclick="viewFile()">View</button>

    <div id="status"></div>

    <img id="imgView" />
    <iframe id="pdfView"></iframe>
  </div>

  <script>
    function viewFile() {
      const url = document.getElementById("linkInput").value.trim();
      const img = document.getElementById("imgView");
      const pdf = document.getElementById("pdfView");
      const status = document.getElementById("status");

      img.style.display = "none";
      pdf.style.display = "none";

      if (!url) {
        alert("Paste a link");
        return;
      }

      status.innerText = "Loading...";

      if (url.includes(".pdf")) {
        pdf.src = url;
        pdf.style.display = "block";
        status.innerText = "PDF loaded";
      } else {
        img.src = url;
        img.style.display = "block";
        status.innerText = "Image loaded";
      }
    }
  </script>

</body>
</html>
